version: "3.8"

services:
  postgres:
    image: postgis/postgis:15-3.3
    platform: linux/amd64 # Use linux/amd64 for Intel/AMD processors
    container_name: oevk-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oevk_data}
      POSTGRES_USER: ${POSTGRES_USER:-oevk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./exports/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./exports/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oevk_user} -d ${POSTGRES_DB:-oevk_data}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oevk-network

  nominatim:
    image: mediagis/nominatim:5.1
    platform: linux/amd64 # Use linux/amd64 for Intel/AMD processors (no emulation)
    container_name: ${NOMINATIM_CONTAINER_NAME:-oevk-nominatim}
    environment:
      # Data source
      - PBF_URL=${NOMINATIM_PBF_URL:-https://download.geofabrik.de/europe/hungary-latest.osm.pbf}
      - REPLICATION_URL=https://download.geofabrik.de/europe/hungary-updates/
      - NOMINATIM_PASSWORD=${NOMINATIM_POSTGRES_PASSWORD:-qaIACxO6wMR3}

      # Import optimization
      - NOMINATIM_IMPORT_STYLE=address
      - FREEZE=true

      # PostgreSQL tuning for faster import (30-40% speed improvement)
      # These settings are optimized for initial import and safe for this use case
      - POSTGRES_SHARED_BUFFERS=2GB
      - POSTGRES_MAINTENANCE_WORK_MEM=1GB
      - POSTGRES_WORK_MEM=50MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=4GB
      - POSTGRES_MAX_WAL_SIZE=4GB
      - POSTGRES_CHECKPOINT_TIMEOUT=30min
      - POSTGRES_SYNCHRONOUS_COMMIT=off # Safe for initial import (increases speed)
      - POSTGRES_FULL_PAGE_WRITES=off # Safe for initial import (increases speed)

      # Parallel processing (adjust based on CPU cores)
      - NOMINATIM_THREADS=${NOMINATIM_THREADS:-4}

      # Gunicorn workers for API requests (increased for better throughput)
      - GUNICORN_WORKERS=32

    ports:
      - "${NOMINATIM_PORT:-8081}:8080"
    volumes:
      - nominatim_data:/var/lib/postgresql/16/main
    shm_size: 4gb # Increased from 2gb for better performance
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15m # Increased from 10m to account for optimized but still lengthy import
    networks:
      - oevk-network

volumes:
  postgres_data:
    driver: local
  nominatim_data:
    driver: local

networks:
  oevk-network:
    driver: bridge
